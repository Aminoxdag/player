<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VLC Ultimate Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --vlc-orange: #ff9500; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; color: white; font-family: system-ui, -apple-system, sans-serif; }
        
        #playerContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #000;
        }

        #mainVideo {
            width: 100% !important;
            height: 100% !important;
            transition: object-fit 0.2s ease;
            display: block;
        }

        .fit-contain { object-fit: contain !important; } 
        .fit-fill { object-fit: fill !important; }        
        .fit-cover { object-fit: cover !important; }     

        .ui-overlay {
            position: absolute;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: linear-gradient(rgba(0,0,0,0.8) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.9) 100%);
            transition: opacity 0.4s ease, visibility 0.4s;
        }

        .ui-hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .search-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            z-index: 1001;
        }

        .url-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50px;
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .search-results {
            position: absolute;
            top: 110%;
            left: 0;
            right: 0;
            background: rgba(15, 15, 15, 0.98);
            backdrop-filter: blur(25px);
            border-radius: 18px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
            display: none;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .search-item {
            padding: 14px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            text-align: right;
            color: #ccc;
        }

        .search-item:hover { background: var(--vlc-orange); color: black; font-weight: bold; }

        .seek-container {
            width: 100%;
            height: 30px;
            display: flex;
            align-items: center;
            cursor: pointer;
            position: relative;
            direction: ltr !important; 
        }

        .seek-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            position: relative;
        }

        #progFill {
            height: 100%;
            background: var(--vlc-orange);
            width: 0%;
            border-radius: 10px;
            position: absolute;
            left: 0;
            top: 0;
        }

        #progFill::after {
            content: '';
            position: absolute;
            right: -8px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .badge-aspect {
            background: rgba(255, 149, 0, 0.15);
            color: var(--vlc-orange);
            border: 1px solid rgba(255, 149, 0, 0.4);
            font-weight: bold;
            font-size: 11px;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
        }

        .btn-skip {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            font-weight: bold;
            color: rgba(255,255,255,0.7);
            transition: 0.2s;
        }
        .btn-skip i { font-size: 24px; margin-bottom: 3px; }
        .btn-skip:active { color: var(--vlc-orange); transform: scale(0.9); }
    </style>
</head>
<body>

<div id="playerContainer">
    <video id="mainVideo" class="fit-contain" playsinline webkit-playsinline>
        <source src="https://cdn.cinema-blue.icu/blk/BLACKED Alexa Grace.mp4" type="video/mp4">
    </video>

    <div id="ui" class="ui-overlay">
        <!-- البحث والخيارات -->
        <div class="p-4 flex flex-col items-center gap-4">
            <div class="search-wrapper">
                <div class="url-box">
                    <i class="fas fa-play-circle text-orange-500 text-lg"></i>
                    <input type="text" id="videoUrl" 
                           class="bg-transparent flex-1 text-xs outline-none border-none text-right text-white/90"
                           placeholder="ابحث عن فيديو..." 
                           autocomplete="off">
                    <button onclick="updateSource()" class="bg-orange-500 text-black text-[11px] font-bold px-5 py-2 rounded-full shadow-lg shadow-orange-500/20">تشغيل</button>
                </div>
                <div id="searchResults" class="search-results"></div>
            </div>
            
            <div class="w-full flex justify-between items-center px-4">
                <span class="text-[10px] font-bold tracking-[3px] opacity-40 uppercase">VLC PRO ULTIMATE</span>
                <div class="flex gap-4 items-center">
                    <div onclick="cycleAspect()" class="badge-aspect" id="aspectLabel">وضع العرض: FIT</div>
                    <button onclick="toggleLock()" class="text-white/80 text-xl"><i id="lockIcon" class="fas fa-unlock"></i></button>
                </div>
            </div>
        </div>

        <!-- التحكم السفلي -->
        <div class="p-6">
            <div class="flex justify-between text-[12px] font-mono mb-2 px-1 opacity-80" dir="ltr">
                <span id="currentTime">00:00</span>
                <span id="durationTime">00:00</span>
            </div>

            <div class="seek-container" id="seekWrapper">
                <div class="seek-bar">
                    <div id="progFill"></div>
                </div>
            </div>

            <div class="flex items-center justify-between mt-5">
                <div class="flex items-center gap-10">
                    <button onclick="togglePlay()" id="playBtn" class="text-5xl text-white hover:text-orange-400 transition transform active:scale-90"><i class="fas fa-play"></i></button>
                    <button onclick="skip(-10)" class="btn-skip"><i class="fas fa-backward"></i><span>10-</span></button>
                    <button onclick="skip(10)" class="btn-skip"><i class="fas fa-forward"></i><span>10+</span></button>
                </div>

                <div class="flex items-center gap-7">
                    <select onchange="video.playbackRate = this.value" class="bg-white/10 text-[11px] border border-white/10 rounded-full px-4 py-1.5 outline-none cursor-pointer">
                        <option value="1">1.0x</option>
                        <option value="1.5">1.5x</option>
                        <option value="2">2.0x</option>
                    </select>

                    <button id="pipBtn" onclick="togglePIP()" title="صورة داخل صورة" class="text-white/70 text-2xl hover:text-orange-500 transition">
                        <i class="fas fa-window-restore"></i>
                    </button>

                    <button onclick="requestFullScreen()" class="text-orange-500 text-3xl hover:scale-110 transition active:scale-95">
                        <i class="fas fa-expand"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('mainVideo');
    const ui = document.getElementById('ui');
    const progFill = document.getElementById('progFill');
    const seekWrapper = document.getElementById('seekWrapper');
    const aspectLabel = document.getElementById('aspectLabel');
    const urlInput = document.getElementById('videoUrl');
    const searchResults = document.getElementById('searchResults');
    const pipBtn = document.getElementById('pipBtn');
    
    let hideTimer;
    let aspectIndex = 0; 
    let isLocked = false;
    let videoLinks = [];

    // جلب الروابط وتخزينها
    async function fetchLinks() {
        try {
            const response = await fetch('https://raw.githubusercontent.com/Aminoxdag/My-links/refs/heads/main/cytube_links.txt');
            const text = await response.text();
            videoLinks = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        } catch (e) { console.error("Error fetching data"); }
    }
    fetchLinks();

    // البحث مع استثناء الروابط الطويلة وعرض الاسم فقط
    urlInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        if (query.length === 0) { searchResults.style.display = 'none'; return; }

        const matches = videoLinks.filter(l => l.toLowerCase().includes(query)).slice(0, 15);
        
        if (matches.length > 0) {
            searchResults.innerHTML = matches.map(fullLink => {
                // استخراج اسم الفيديو فقط (إزالة الجزء المشترك من الرابط)
                let displayName = fullLink.replace(/https?:\/\/cdn\.cinema-blue\.icu\/blk\//gi, '').replace(/%20/g, ' ');
                return `<div class="search-item" onclick="selectResult('${fullLink}')">${displayName}</div>`;
            }).join('');
            searchResults.style.display = 'block';
        } else { searchResults.style.display = 'none'; }
    });

    function selectResult(fullLink) {
        urlInput.value = fullLink; // نضع الرابط الكامل في الحقل المخفي/الخلفي للتشغيل
        searchResults.style.display = 'none';
        updateSource();
    }

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-wrapper')) searchResults.style.display = 'none';
    });

    function showUI() {
        if (isLocked) return;
        ui.classList.remove('ui-hidden');
        clearTimeout(hideTimer);
        if (!video.paused) hideTimer = setTimeout(() => ui.classList.add('ui-hidden'), 3000);
    }

    document.getElementById('playerContainer').addEventListener('mousemove', showUI);
    document.getElementById('playerContainer').addEventListener('touchstart', showUI);

    function togglePlay() {
        if (video.paused) {
            video.play();
            document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>';
        } else {
            video.pause();
            document.getElementById('playBtn').innerHTML = '<i class="fas fa-play"></i>';
        }
        showUI();
    }

    video.addEventListener('click', togglePlay);

    video.ontimeupdate = () => {
        const percent = (video.currentTime / video.duration) * 100;
        progFill.style.width = percent + '%';
        document.getElementById('currentTime').innerText = formatTime(video.currentTime);
        document.getElementById('durationTime').innerText = formatTime(video.duration || 0);
    };

    function formatTime(s) {
        let m = Math.floor(s / 60);
        let sec = Math.floor(s % 60);
        return (m < 10 ? '0'+m : m) + ":" + (sec < 10 ? '0'+sec : sec);
    }

    function seek(e) {
        const rect = seekWrapper.getBoundingClientRect();
        const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const x = clientX - rect.left;
        let pos = x / rect.width;
        if (pos < 0) pos = 0; if (pos > 1) pos = 1;
        video.currentTime = pos * video.duration;
    }

    seekWrapper.onmousedown = (e) => {
        seek(e);
        window.onmousemove = seek;
        window.onmouseup = () => window.onmousemove = null;
    };
    seekWrapper.ontouchmove = seek;

    function cycleAspect() {
        aspectIndex = (aspectIndex + 1) % 3;
        video.className = '';
        if (aspectIndex === 0) { video.classList.add('fit-contain'); aspectLabel.innerText = "وضع العرض: FIT"; }
        else if (aspectIndex === 1) { video.classList.add('fit-fill'); aspectLabel.innerText = "وضع العرض: STRETCH"; }
        else if (aspectIndex === 2) { video.classList.add('fit-cover'); aspectLabel.innerText = "وضع العرض: ZOOM"; }
        showUI();
    }

    function updateSource() {
        const url = urlInput.value.trim();
        if (url) {
            video.src = url;
            video.load();
            video.play().then(() => {
                document.getElementById('playBtn').innerHTML = '<i class="fas fa-pause"></i>';
            });
            showUI();
        }
    }

    async function togglePIP() {
        try {
            if (video !== document.pictureInPictureElement) await video.requestPictureInPicture();
            else await document.exitPictureInPicture();
        } catch (e) { console.error("PIP Error"); }
    }

    function requestFullScreen() {
        const container = document.getElementById('playerContainer');
        if (!document.fullscreenElement) {
            if (container.requestFullscreen) {
                container.requestFullscreen().then(() => {
                    // محاولة إجبار التدوير بالعرض على الهواتف
                    if (screen.orientation && screen.orientation.lock) {
                        screen.orientation.lock('landscape').catch(() => {});
                    }
                });
            } else if (video.webkitEnterFullscreen) {
                video.webkitEnterFullscreen();
            }
        } else {
            document.exitFullscreen();
        }
    }

    // الاستماع لتغير وضع الشاشة لضمان التنسيق
    document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement && screen.orientation && screen.orientation.unlock) {
            screen.orientation.unlock();
        }
    });

    function skip(val) {
        video.currentTime += val;
        showUI();
    }

    function toggleLock() {
        isLocked = !isLocked;
        document.getElementById('lockIcon').className = isLocked ? "fas fa-lock text-orange-500" : "fas fa-unlock";
        if (isLocked) ui.classList.add('ui-hidden');
        else showUI();
    }

    video.onloadedmetadata = () => {
        document.getElementById('durationTime').innerText = formatTime(video.duration);
    };

    window.onkeydown = (e) => {
        if (document.activeElement === urlInput) return;
        if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
        if (e.code === 'KeyF') requestFullScreen();
        if (e.code === 'KeyP') togglePIP();
        if (e.code === 'ArrowRight') skip(10);
        if (e.code === 'ArrowLeft') skip(-10);
    };
</script>
</body>
</html>
