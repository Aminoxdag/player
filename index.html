<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VLC Ultimate Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --vlc-orange: #ff9500; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: white; 
            font-family: system-ui, -apple-system, sans-serif;
            /* تم تمكين التمرير الطولي بشكل دائم لإصلاح مشاكل المتصفحات الجوالة */
            overflow-x: hidden;
            overflow-y: auto; 
            scroll-behavior: smooth;
        }

        #playerContainer {
            position: relative;
            width: 100vw;
            /* زيادة الارتفاع قليلاً للسماح بالتمرير والوصول للأزرار السفلية بسهولة */
            height: 105vh; 
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            flex-shrink: 0;
        }

        #mainVideo {
            width: 100% !important;
            height: 100% !important;
            transition: object-fit 0.2s ease;
            display: block;
        }

        .fit-contain { object-fit: contain !important; } 
        .fit-fill { object-fit: fill !important; }        
        .fit-cover { object-fit: cover !important; }     

        .ui-overlay {
            position: absolute;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: linear-gradient(rgba(0,0,0,0.8) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.9) 100%);
            transition: opacity 0.4s ease, visibility 0.4s;
        }

        .ui-hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .search-wrapper {
            position: relative;
            width: 100%;
            max-width: 650px;
            z-index: 1001;
        }

        .url-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50px;
            padding: 4px 6px;
            display: flex;
            align-items: center;
            width: 100%;
            box-shadow: 0 4px 30px rgba(0,0,0,0.3);
        }

        .library-btn {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 149, 0, 0.2);
            color: var(--vlc-orange);
            border-radius: 50%;
            border: 1px solid rgba(255, 149, 0, 0.3);
            margin-left: 10px;
            flex-shrink: 0;
            transition: 0.2s;
        }

        .url-input {
            background: transparent;
            flex: 1;
            font-size: 13px;
            outline: none;
            border: none;
            text-align: right;
            color: white;
            padding: 0 10px;
        }

        .play-action-btn {
            background: var(--vlc-orange);
            color: black;
            font-size: 12px;
            font-weight: bold;
            padding: 8px 18px;
            border-radius: 50px;
        }

        .search-results {
            position: absolute;
            top: 115%;
            left: 10px;
            right: 10px;
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(25px);
            border-radius: 20px;
            max-height: 280px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
            display: none;
        }

        .search-item {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            text-align: right;
        }

        .seek-container {
            width: 100%;
            height: 30px;
            display: flex;
            align-items: center;
            cursor: pointer;
            position: relative;
            direction: ltr !important; 
        }

        .seek-bar {
            width: 100%;
            height: 5px;
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            position: relative;
        }

        #progFill {
            height: 100%;
            background: var(--vlc-orange);
            width: 0%;
            border-radius: 10px;
            position: absolute;
            left: 0;
        }

        #progFill::after {
            content: '';
            position: absolute;
            right: -8px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
        }

        .badge-aspect {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 11px;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
        }

        .btn-skip {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            color: rgba(255,255,255,0.7);
        }
        .btn-skip i { font-size: 24px; margin-bottom: 3px; }

        #captureFlash {
            position: absolute;
            inset: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 1000;
        }
        @keyframes flashEffect {
            0% { opacity: 0.8; }
            100% { opacity: 0; }
        }

        .active-btn { border-color: var(--vlc-orange) !important; color: var(--vlc-orange) !important; }
    </style>
</head>
<body>

<div id="playerContainer">
    <div id="captureFlash"></div>
    <video id="mainVideo" class="fit-contain" playsinline webkit-playsinline crossorigin="anonymous">
    </video>

    <div id="ui" class="ui-overlay">
        <!-- البحث في الأعلى -->
        <div class="p-4 pt-6 flex flex-col items-center gap-4">
            <div class="search-wrapper">
                <div class="url-box">
                    <button onclick="window.open('https://aminoxdag.github.io/BLACKED-POMF/', '_blank')" class="library-btn">
                        <i class="fas fa-th-large"></i>
                    </button>
                    <input type="text" id="videoUrl" class="url-input" placeholder="ابحث أو الصق رابط فيديو مباشر..." autocomplete="off">
                    <button id="mainActionBtn" onclick="updateSource()" class="play-action-btn">تشغيل</button>
                </div>
                <div id="searchResults" class="search-results"></div>
            </div>
            
            <div class="w-full flex flex-wrap justify-center gap-2 items-center px-4">
                <button onclick="toggleFrameMode()" id="frameModeToggle" class="badge-aspect">
                    <i class="fas fa-film ml-1"></i> وضع التدقيق
                </button>
                <div onclick="cycleAspect()" class="badge-aspect" id="aspectLabel">وضع العرض: FIT</div>
                <button onclick="toggleLock()" class="text-white/60 text-xl"><i id="lockIcon" class="fas fa-unlock"></i></button>
            </div>
        </div>

        <!-- التحكم السفلي -->
        <div class="p-6 bg-black/40 backdrop-blur-sm">
            <div class="flex justify-between text-[12px] font-mono mb-2 px-1 opacity-70" dir="ltr">
                <span id="currentTime">00:00</span>
                <span id="durationTime">00:00</span>
            </div>

            <div class="seek-container" id="seekWrapper">
                <div class="seek-bar">
                    <div id="progFill"></div>
                </div>
            </div>

            <div class="flex items-center justify-between mt-5">
                <div class="flex items-center gap-6 md:gap-10">
                    <button onclick="togglePlay()" id="playBtnSmall" class="text-4xl text-white">
                        <i class="fas fa-play"></i>
                    </button>
                    
                    <!-- التحكم العادي -->
                    <div id="skipControls" class="flex gap-6 md:gap-10">
                        <button onclick="skip(-10)" class="btn-skip"><i class="fas fa-backward"></i><span>10-</span></button>
                        <button onclick="skip(10)" class="btn-skip"><i class="fas fa-forward"></i><span>10+</span></button>
                    </div>

                    <!-- تحكم الفريمات -->
                    <div id="frameControls" class="hidden flex gap-6 md:gap-10">
                        <button onclick="stepFrame(-1)" class="btn-skip text-orange-500"><i class="fas fa-step-backward"></i><span>فريم-</span></button>
                        <button onclick="saveFrame()" class="btn-skip text-white"><i class="fas fa-camera"></i><span>حفظ PNG</span></button>
                        <button onclick="stepFrame(1)" class="btn-skip text-orange-500"><i class="fas fa-step-forward"></i><span>فريم+</span></button>
                    </div>
                </div>

                <div class="flex items-center gap-4 md:gap-7">
                    <select onchange="video.playbackRate = this.value" class="bg-white/10 text-[11px] rounded-full px-3 py-1 outline-none">
                        <option value="1">1.0x</option>
                        <option value="1.5">1.5x</option>
                        <option value="2">2.0x</option>
                    </select>
                    <button onclick="togglePIP()" class="text-white/70 text-2xl"><i class="fas fa-window-restore"></i></button>
                    <button onclick="requestFullScreen()" class="text-orange-500 text-3xl"><i class="fas fa-expand"></i></button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('mainVideo');
    const ui = document.getElementById('ui');
    const progFill = document.getElementById('progFill');
    const seekWrapper = document.getElementById('seekWrapper');
    const aspectLabel = document.getElementById('aspectLabel');
    const urlInput = document.getElementById('videoUrl');
    const searchResults = document.getElementById('searchResults');
    
    let hideTimer;
    let aspectIndex = 0; 
    let isLocked = false;
    let videoLinks = [];
    let isTyping = false; 
    let isFrameMode = false;

    async function fetchLinks() {
        try {
            const response = await fetch('https://raw.githubusercontent.com/Aminoxdag/My-links/refs/heads/main/cytube_links.txt');
            const text = await response.text();
            videoLinks = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        } catch (e) { console.error("Fetch error"); }
    }
    fetchLinks();

    window.onload = function() {
        const hash = decodeURIComponent(window.location.hash.substring(1));
        if (hash.startsWith('http')) { urlInput.value = hash; updateSource(); }
    }

    function showUI() {
        if (isLocked || isTyping) return;
        ui.classList.remove('ui-hidden');
        clearTimeout(hideTimer);
        if (!video.paused) hideTimer = setTimeout(() => {
            if (!isTyping) ui.classList.add('ui-hidden');
        }, 3000);
    }

    document.getElementById('playerContainer').addEventListener('mousemove', showUI);
    document.getElementById('playerContainer').addEventListener('touchstart', showUI);

    function togglePlay() {
        if (video.paused) {
            video.play();
            document.getElementById('playBtnSmall').innerHTML = '<i class="fas fa-pause"></i>';
        } else {
            video.pause();
            document.getElementById('playBtnSmall').innerHTML = '<i class="fas fa-play"></i>';
        }
        showUI();
    }

    video.addEventListener('click', togglePlay);

    video.ontimeupdate = () => {
        const percent = (video.currentTime / video.duration) * 100;
        progFill.style.width = percent + '%';
        document.getElementById('currentTime').innerText = formatTime(video.currentTime);
        document.getElementById('durationTime').innerText = formatTime(video.duration || 0);
    };

    function formatTime(s) {
        let m = Math.floor(s / 60);
        let sec = Math.floor(s % 60);
        return (m < 10 ? '0'+m : m) + ":" + (sec < 10 ? '0'+sec : sec);
    }

    function seek(e) {
        const rect = seekWrapper.getBoundingClientRect();
        const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const x = clientX - rect.left;
        let pos = x / rect.width;
        video.currentTime = Math.max(0, Math.min(1, pos)) * video.duration;
    }

    seekWrapper.onmousedown = (e) => { seek(e); window.onmousemove = seek; window.onmouseup = () => window.onmousemove = null; };
    seekWrapper.ontouchmove = seek;

    function toggleFrameMode() {
        isFrameMode = !isFrameMode;
        const skipCtrls = document.getElementById('skipControls');
        const frameCtrls = document.getElementById('frameControls');
        const toggleBtn = document.getElementById('frameModeToggle');

        if (isFrameMode) {
            video.pause();
            document.getElementById('playBtnSmall').innerHTML = '<i class="fas fa-play"></i>';
            skipCtrls.classList.add('hidden');
            frameCtrls.classList.remove('hidden');
            toggleBtn.classList.add('active-btn');
        } else {
            skipCtrls.classList.remove('hidden');
            frameCtrls.classList.add('hidden');
            toggleBtn.classList.remove('active-btn');
        }
        showUI();
    }

    function stepFrame(dir) {
        video.currentTime += (dir * (1/24));
        showUI();
    }

    function saveFrame() {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        try {
            const link = document.createElement('a');
            link.download = `VLC_Snap_${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            const flash = document.getElementById('captureFlash');
            flash.style.animation = 'none'; flash.offsetHeight;
            flash.style.animation = 'flashEffect 0.3s ease-out';
        } catch (e) { console.error("CORS Error"); }
    }

    function updateSource() {
        const url = urlInput.value.trim();
        if (url) {
            video.src = url;
            video.load();
            video.play().then(() => {
                document.getElementById('playBtnSmall').innerHTML = '<i class="fas fa-pause"></i>';
            }).catch(() => {});
        }
    }

    function cycleAspect() {
        aspectIndex = (aspectIndex + 1) % 3;
        video.className = aspectIndex === 0 ? 'fit-contain' : (aspectIndex === 1 ? 'fit-fill' : 'fit-cover');
        aspectLabel.innerText = "وضع العرض: " + (aspectIndex === 0 ? "FIT" : (aspectIndex === 1 ? "STRETCH" : "ZOOM"));
    }

    function requestFullScreen() {
        const container = document.getElementById('playerContainer');
        if (!document.fullscreenElement) {
            if (container.requestFullscreen) container.requestFullscreen();
            else if (video.webkitEnterFullscreen) video.webkitEnterFullscreen();
        } else { document.exitFullscreen(); }
    }

    function skip(val) { video.currentTime += val; showUI(); }

    function toggleLock() {
        isLocked = !isLocked;
        document.getElementById('lockIcon').className = isLocked ? "fas fa-lock text-orange-500" : "fas fa-unlock";
        if (isLocked) ui.classList.add('ui-hidden'); else showUI();
    }

    // النقر المزدوج على الجوانب للتقديم/التأخير
    video.addEventListener('dblclick', (e) => {
        const rect = video.getBoundingClientRect();
        const x = e.clientX - rect.left;
        if (x < rect.width / 2) isFrameMode ? stepFrame(-1) : skip(-10);
        else isFrameMode ? stepFrame(1) : skip(10);
    });

    urlInput.onfocus = () => { isTyping = true; clearTimeout(hideTimer); ui.classList.remove('ui-hidden'); };
    urlInput.onblur = () => { isTyping = false; setTimeout(() => { searchResults.style.display = 'none'; }, 200); showUI(); };

    urlInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        if (query.length === 0 || query.startsWith('http')) { searchResults.style.display = 'none'; return; }
        const matches = videoLinks.filter(l => l.toLowerCase().includes(query)).slice(0, 15);
        if (matches.length > 0) {
            searchResults.innerHTML = matches.map(l => `<div class="search-item" onclick="urlInput.value='${l}';updateSource();">${l.split('/').pop()}</div>`).join('');
            searchResults.style.display = 'block';
        }
    });
</script>
</body>
</html>
